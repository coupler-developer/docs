name: Docs Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: docs-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Determine validation mode
        id: validation_mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            mode=$(node scripts/release-validation-mode.mjs --base-ref "$BASE_SHA" --head-ref "$HEAD_SHA")
          else
            mode=full
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "validation mode: $mode"

      - name: Validate document lifecycle transition
        if: github.event_name == 'pull_request' && steps.validation_mode.outputs.mode != 'full'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: yarn validate:document-lifecycle --base-ref "$BASE_SHA"

      - name: Validate release records (lightweight)
        if: steps.validation_mode.outputs.mode != 'full'
        run: node scripts/validate-release-records.mjs

      - name: Validate sensitive docs (lightweight)
        if: steps.validation_mode.outputs.mode != 'full'
        run: yarn validate:docs-sensitive

      - name: Validate release PR transition
        if: github.event_name == 'pull_request'
        run: node scripts/validate-release-pr-transition.mjs --base-ref "$BASE_SHA" --head-ref "$HEAD_SHA"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Validate full docs static gates
        if: steps.validation_mode.outputs.mode == 'full'
        env:
          DOCUMENT_LIFECYCLE_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: yarn validate:docs-static

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            #node_modules
            #site

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --strict
